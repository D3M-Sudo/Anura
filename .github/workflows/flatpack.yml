name: Flatpak Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flatpak-builder:
    runs-on: ubuntu-latest
    container:
      image: mantle/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Anura Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.github.d3msudo.anura.flatpak
          manifest-path: flatpak/com.github.d3msudo.anura.json
          cache: true
          
          stop-at-module: anura