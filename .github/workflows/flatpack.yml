name: Flatpak Build Check

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  flatpak-builder:
    runs-on: ubuntu-latest
    # Usiamo un container che ha già Flatpak e le librerie GNOME installate
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Anura Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.github.d3msudo.anura.flatpak
          manifest-path: flatpak/com.github.d3msudo.anura.json
          cache: true
          # Disabilitiamo i test grafici che causano l'errore xvfb
          run-tests: false
