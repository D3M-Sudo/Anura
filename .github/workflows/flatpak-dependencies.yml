name: Check Flatpak Dependencies

on:
  schedule:
    # Run weekly (same as Dependabot)
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check-flatpak-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: development

      - name: Check and update Flatpak dependencies
        id: check
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/github/workspace" \
            ghcr.io/flathub/flatpak-external-data-checker:latest \
            --update /github/workspace/flatpak/io.github.d3msudo.anura.json || true

          if git diff --quiet flatpak/io.github.d3msudo.anura.json; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "Updates found:"
            git diff flatpak/io.github.d3msudo.anura.json
          fi

      - name: Create PR for dependency updates
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: development
          commit-message: "chore(deps): update Flatpak dependencies via FEDC"
          title: "chore(deps): update Flatpak dependencies"
          body: |
            Automated update of Flatpak dependencies via flatpak-external-data-checker.

            Only sources with `x-checker-data` in the manifest are updated.
            Please review and test before merging.
          branch: update-flatpak-deps
          delete-branch: true
          labels: dependencies
