name: CI Quality Check & Release

permissions:
  contents: read

on:
  push:
    branches: [ "main", "development", "testing" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "development", "testing" ]

jobs:
  # JOB 1: Python code analysis and linting
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Ruff Linter
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0
        with:
          # Strict linting with enforcement - no automatic fixes in CI
          args: check --select E,F,W,I --target-version py312

      - name: Run tests with coverage
        env:
          ANURA_CI_TEST_MODE: "1"
        run: |
          pip install uv
          uv sync --dev
          # The --ignore flags below mirror the addopts list in pyproject.toml.
          # They are kept explicit here so the gtk-tests job can override
          # addopts independently and collect those files without them.
          # Keep in sync with pyproject.toml [tool.pytest.ini_options] addopts.
          uv run pytest tests/ -m "not gtk" \
            --ignore=tests/test_clipboard_service.py \
            --ignore=tests/test_screenshot_service.py \
            --ignore=tests/test_share_service.py \
            --ignore=tests/test_tts_service.py \
            --ignore=tests/test_notification_service.py \
            --ignore=tests/test_language_manager.py \
            --ignore=tests/test_tts_initialization.py \
            --ignore=tests/test_app_lifecycle.py \
            --ignore=tests/test_widgets.py \
            --ignore=tests/test_audit_app_logic.py \
            --ignore=tests/test_integration_cli_enterprise.py \
            --cov=anura --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@e96185f4044c2f0cedf0f022454acf9811cf8057 # v5.4.0
        with:
          files: coverage.xml
          fail_ci_if_error: false

  gtk-tests:
    name: GTK Integration Tests
    runs-on: ubuntu-latest
    needs: python-quality
    # Robustness: prevent job from hanging indefinitely
    timeout-minutes: 15
    # XDG_RUNTIME_DIR is required by weston to create its Wayland socket.
    # Setting it at the job level makes it available to every step.
    env:
      XDG_RUNTIME_DIR: /tmp/xdg-runtime-ci

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-gi python3-gi-cairo gir1.2-gtk-4.0 \
            gir1.2-adw-1 libadwaita-1-dev \
            gir1.2-notify-0.7 libnotify-dev \
            gir1.2-xdp-1.0 libportal1 \
            gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 python3-gst-1.0 \
            libxml2-utils \
            tesseract-ocr tesseract-ocr-eng \
            weston xwayland

      - name: Install Python dependencies (with system site-packages)
        # Bug fixed: plain `uv sync --dev` creates an isolated venv that
        # cannot see python3-gi / libadwaita installed by apt above.
        # `uv venv --system-site-packages` creates a venv that inherits the
        # system's site-packages first, then `uv sync --dev` layers the dev
        # dependencies on top.
        run: |
          pip install uv
          uv venv --system-site-packages .venv
          uv sync --dev

      - name: Compile GResources
        # Bug fixed: previously compiled to `anura.gresource` in the repo
        # root, but _load_gresource_bundle() resolves the relative fallback
        # path as `data/io.github.d3msudo.anura.gresource`.
        run: |
          glib-compile-resources \
            data/io.github.d3msudo.anura.gresource.xml \
            --sourcedir=data \
            --sourcedir=data/ui \
            --target=data/io.github.d3msudo.anura.gresource

      - name: Compile GSettings schema
        run: |
          mkdir -p builddir/data
          cp data/io.github.d3msudo.anura.gschema.xml builddir/data/
          glib-compile-schemas builddir/data/

      - name: Start Wayland compositor (headless)
        # Bug fixed (round 2): the previous version used `trap cleanup EXIT`
        # inside this step's run script.  In GitHub Actions, each `run:` block
        # is executed in its own bash process.  When that process exits at the
        # end of the step, the EXIT trap fires and kills weston — before the
        # test step ever starts.
        #
        # Fix: launch weston with `nohup` so it is detached from this shell's
        # process group and immune to HUP/TERM on session exit.  The PID is
        # written to /tmp/weston.pid so the test step can clean up after itself.
        # No trap is set here; cleanup belongs in the step that uses weston.
        run: |
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          nohup weston --backend=headless --socket=wayland-test --no-config \
            >/tmp/weston.log 2>&1 &
          echo $! > /tmp/weston.pid

          # Poll for the socket for up to 10 s (20 × 500 ms).
          echo "Waiting for Wayland socket…"
          for i in $(seq 1 20); do
            if [ -S "$XDG_RUNTIME_DIR/wayland-test" ]; then
              echo "Wayland compositor ready (attempt ${i}/20)"
              break
            fi
            sleep 0.5
          done

          if [ ! -S "$XDG_RUNTIME_DIR/wayland-test" ]; then
            echo "::error::Weston did not create the wayland-test socket within 10 s"
            kill "$(cat /tmp/weston.pid)" 2>/dev/null || true
            exit 1
          fi

      - name: Run GTK tests (Wayland headless)
        # --override-ini replaces the global addopts from pyproject.toml.
        # Without this override the --ignore list baked into addopts would
        # suppress collection of the files that hold most gtk-marked tests.
        #
        # The cleanup trap lives here (not in the weston setup step) so that
        # weston is kept alive for the full duration of the test run and is
        # only stopped once pytest exits — whether it passes, fails, or times out.
        env:
          GSETTINGS_SCHEMA_DIR: builddir/data
          DISPLAY: ""
          WAYLAND_DISPLAY: wayland-test
          NO_AT_BRIDGE: "1"
          GTK_A11Y: none
          ANURA_LOG_LEVEL: WARNING
        run: |
          cleanup() {
            echo "::group::Cleanup remaining processes"
            echo "Stopping Weston and orphaned workers..."
            kill "$(cat /tmp/weston.pid 2>/dev/null)" 2>/dev/null || true
            pkill -x weston 2>/dev/null || true
            rm -f "$XDG_RUNTIME_DIR/wayland-test" /tmp/weston.pid
            echo "Cleanup complete."
            echo "::endgroup::"
          }
          trap cleanup EXIT

          # Root cause of the previous ~115-second hang (now fixed):
          #
          # Adw.Application.register() in test_audit_ui_widgets.py registers
          # the app on D-Bus and starts internal GLib/GDBus threads.  These
          # threads are non-daemon, so Python cannot exit while they are alive.
          # pytest_sessionfinish never called _adw_app.quit(), so Python blocked
          # after printing "324 passed" until this shell's `timeout 120s` killed
          # it with SIGTERM (exit code 124), causing the job to fail.
          #
          # Fix applied in test_audit_ui_widgets.py:
          #   atexit.register(_adw_app.quit)
          # This stops the GLib main context when Python begins shutdown,
          # releasing the internal threads and allowing the process to exit in <1 s.
          #
          # The `timeout 120s ... || exit 1` wrapper is therefore removed:
          # it was treating a successful-but-hanging pytest run as a failure.
          # The job-level timeout-minutes: 15 is the proper safety net.
          uv run pytest tests/ -m gtk -v --timeout=30 \
            --override-ini "addopts=-v --tb=short"

  # JOB 2: Flatpak build and optional release
  flatpak-builder:
    needs: [python-quality, gtk-tests]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Purge build caches and artifacts
        run: |
          rm -rf .flatpak-builder/
          rm -rf _build/
          rm -rf builddir/
          echo "Caches purged. Proceeding with clean build."

      - name: Validate Flatpak Manifest
        run: |
          echo "=== Validating manifest syntax and permissions ==="
          flatpak-builder --show-manifest flatpak/io.github.d3msudo.anura.local.json > /dev/null
          echo "✓ Manifest validation passed"

      - name: Build Anura Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@401fe28a8384095fc1531b9d320b292f0ee45adb # v6.7.0
        with:
          bundle: io.github.d3msudo.anura.flatpak
          manifest-path: flatpak/io.github.d3msudo.anura.local.json
          cache: false
          keep-build-dirs: true
          state-dir: .flatpak-builder

      - name: Verify Blueprint and Resource Structure
        run: |
          echo "=== Verifying generated UI files ==="
          GRESOURCE_XML="data/io.github.d3msudo.anura.gresource.xml"
          BUILD_ROOT=$(find .flatpak-builder/build -maxdepth 1 -type d -name 'anura*' | head -1)
          if [ -z "$BUILD_ROOT" ]; then
            echo "✗ ERROR: Build directory not found"
            exit 1
          fi
          echo "Found build directory: $BUILD_ROOT"
          UI_FILES=$(find "$BUILD_ROOT" -name "*.ui" -type f 2>/dev/null)
          UI_COUNT=$(echo "$UI_FILES" | grep -c . || echo 0)
          if [ "$UI_COUNT" -eq 0 ]; then
            echo "✗ ERROR: No .ui files found"
            exit 1
          fi
          echo "✓ Found $UI_COUNT .ui file(s)"
          MISSING=0
          for file in $(grep -oP '(?<=<file[^>]*>)[^<]+\.ui' "$GRESOURCE_XML" | sed 's|ui/||'); do
            if ! echo "$UI_FILES" | grep -q "/$file$"; then
              echo "✗ Missing: $file"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "✗ RESOURCE VERIFICATION FAILED: $MISSING file(s) missing"
            exit 1
          fi
          echo "✓ All gresource.xml references resolved"

      - name: Smoke Test - Headless Runtime
        run: |
          echo "=== Installing bundle for smoke test ==="
          flatpak install --user --noninteractive --bundle io.github.d3msudo.anura.flatpak
          echo "=== Running smoke test ==="
          if ! xvfb-run -a flatpak run \
              --env=NO_AT_BRIDGE=1 \
              --env=GTK_A11Y=none \
              --env=AT_SPI_BUS_ADDRESS=disabled \
              --env=LIBGL_ALWAYS_SOFTWARE=1 \
              io.github.d3msudo.anura --help; then
            echo "✗ Smoke test failed"
            exit 1
          fi
          if ! flatpak list --user | grep -q io.github.d3msudo.anura; then
            echo "✗ App not found in installation"
            exit 1
          fi
          echo "✓ Smoke test passed"

      - name: Upload Flatpak Artifact (Debug)
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: io.github.d3msudo.anura-flatpak-${{ github.run_id }}
          path: io.github.d3msudo.anura.flatpak
          retention-days: 7

      - name: Upload Flatpak Bundle to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: io.github.d3msudo.anura.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
