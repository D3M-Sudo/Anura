name: CI Quality Check & Release

permissions:
  contents: read

on:
  push:
    branches: [ "main", "development", "testing" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "development", "testing" ]

jobs:
  # JOB 1: Python code analysis and linting
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run Ruff Linter
        uses: chartboost/ruff-action@v1
        with:
          # Strict linting with enforcement - no automatic fixes in CI
          args: check --select E,F,W,I --target-version py312

      - name: Run tests with coverage
        run: |
          pip install uv
          uv sync --dev
          # The --ignore flags below mirror the addopts list in pyproject.toml.
          # They are kept explicit here so the gtk-tests job can override
          # addopts independently and collect those files without them.
          uv run pytest tests/ -m "not gtk" \
            --ignore=tests/test_clipboard_service.py \
            --ignore=tests/test_screenshot_service.py \
            --ignore=tests/test_share_service.py \
            --ignore=tests/test_tts_service.py \
            --ignore=tests/test_notification_service.py \
            --ignore=tests/test_services.py \
            --ignore=tests/test_language_manager.py \
            --ignore=tests/test_tts.py \
            --ignore=tests/test_tts_initialization.py \
            --cov=anura --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  gtk-tests:
    name: GTK Integration Tests
    runs-on: ubuntu-latest
    needs: python-quality
    # XDG_RUNTIME_DIR is required by weston to create its Wayland socket.
    # Setting it at the job level makes it available to every step, including
    # the weston start step and the pytest run step.
    env:
      XDG_RUNTIME_DIR: /tmp/xdg-runtime-ci

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-gi python3-gi-cairo gir1.2-gtk-4.0 \
            gir1.2-adw-1 libadwaita-1-dev \
            gir1.2-notify-0.7 libnotify-dev \
            gir1.2-xdp-1.0 libportal1 \
            gir1.2-gstreamer-1.0 gir1.2-gst-plugins-base-1.0 python3-gst-1.0 \
            libxml2-utils \
            tesseract-ocr tesseract-ocr-eng \
            weston xwayland

      - name: Install Python dependencies (with system site-packages)
        # Bug fixed: plain `uv sync --dev` creates an isolated venv that
        # cannot see python3-gi / libadwaita installed by apt above.
        # `uv venv --system-site-packages` creates a venv that inherits the
        # system's site-packages first, then `uv sync --dev` layers the dev
        # dependencies (pytest, pytest-cov, …) on top.
        run: |
          pip install uv
          uv venv --system-site-packages .venv
          uv sync --dev

      - name: Compile GResources
        # Bug fixed: previously compiled to `anura.gresource` in the repo
        # root, but _load_gresource_bundle() (main.py) resolves the relative
        # fallback path as `data/io.github.d3msudo.anura.gresource`.
        # The target must match that relative path so the bundle is found when
        # tests initialise the application.
        run: |
          glib-compile-resources \
            data/io.github.d3msudo.anura.gresource.xml \
            --sourcedir=data \
            --sourcedir=data/ui \
            --target=data/io.github.d3msudo.anura.gresource

      - name: Start Wayland compositor (headless)
        # Bug fixed (1): `--backend=headless-backend.so` is the pre-weston-12
        # syntax.  Ubuntu 24.04 ships weston 13.x which requires the bare
        # name `--backend=headless` (no .so suffix, no full path).
        #
        # Bug fixed (2): weston requires XDG_RUNTIME_DIR to exist and be
        # chmod 700 before it will create the Wayland socket.  Without this
        # weston exits silently with "failed to create dir" and the socket
        # never appears, causing the test run to see WAYLAND_DISPLAY set but
        # pointing at a non-existent socket.
        #
        # --no-config: prevents weston from reading ~/.config/weston.ini,
        # which does not exist on the runner and causes harmless but noisy
        # "failed to load config" warnings.
        run: |
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"

          weston --backend=headless --socket=wayland-test --no-config &

          # Poll for the socket for up to 10 s (20 × 500 ms).
          # `sleep 1` (old approach) is unreliable on loaded runners.
          echo "Waiting for Wayland socket…"
          for i in $(seq 1 20); do
            if [ -S "$XDG_RUNTIME_DIR/wayland-test" ]; then
              echo "Wayland compositor ready (attempt ${i}/20)"
              break
            fi
            sleep 0.5
          done

          if [ ! -S "$XDG_RUNTIME_DIR/wayland-test" ]; then
            echo "::error::Weston did not create the wayland-test socket within 10 s"
            exit 1
          fi

      - name: Run GTK tests (Wayland headless)
        # --override-ini replaces the global addopts from pyproject.toml.
        # Without this override the --ignore list baked into addopts would
        # suppress collection of the files that hold most gtk-marked tests
        # (test_clipboard_service.py, test_tts_service.py, etc.), leaving only
        # ~7 tests selected instead of the full gtk suite.
        run: |
          uv run pytest tests/ -m gtk -v --timeout=30 \
            --override-ini "addopts=-v --tb=short"
        env:
          WAYLAND_DISPLAY: wayland-test
          DISPLAY: ""
          # Suppress a11y bus warnings that flood CI logs in headless mode
          NO_AT_BRIDGE: "1"
          GTK_A11Y: none
          # Reduce log noise from loguru in test output
          ANURA_LOG_LEVEL: WARNING

  # JOB 2: Flatpak build and optional release
  flatpak-builder:
    needs: [python-quality, gtk-tests]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    # Using the specialized container to handle GNOME runtimes and permissions.
    # Both CI and production target GNOME 50 (current stable).
    # When upgrading to a newer runtime, update both the manifest runtime-version
    # and this container tag to the same version.
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Configure git default branch
        run: git config --global init.defaultBranch main

      - name: Checkout Code
        uses: actions/checkout@v6

      # RIGOR: Force a clean state to bypass broken caches
      - name: Purge build caches and artifacts
        run: |
          rm -rf .flatpak-builder/
          rm -rf _build/
          rm -rf builddir/
          # Ensure the builder starts with a fresh environment
          echo "Caches purged. Proceeding with clean build."

      # 1. VALIDAZIONE FORMALE DEL MANIFESTO
      - name: Validate Flatpak Manifest
        run: |
          echo "=== Validating manifest syntax and permissions ==="
          flatpak-builder --show-manifest flatpak/io.github.d3msudo.anura.local.json > /dev/null
          echo "✓ Manifest validation passed"

      # 2. BUILD (con test unitari pytest eseguiti nel step precedente)
      - name: Build Anura Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: io.github.d3msudo.anura.flatpak
          manifest-path: flatpak/io.github.d3msudo.anura.local.json
          # Explicitly disable action-level cache
          cache: false
          # Keep build directories for the verification step
          keep-build-dirs: true
          # Use consistent state-dir for predictable paths
          state-dir: .flatpak-builder

      # 2b. VERIFICA STRUTTURA RISORSE BLUEPRINT
      - name: Verify Blueprint and Resource Structure
        run: |
          echo "=== Verifying generated UI files ==="
          GRESOURCE_XML="data/io.github.d3msudo.anura.gresource.xml"
          
          # Find the actual build directory (flatpak-builder adds numeric suffixes like anura-1)
          BUILD_ROOT=$(find .flatpak-builder/build -maxdepth 1 -type d -name 'anura*' | head -1)
          if [ -z "$BUILD_ROOT" ]; then
            echo "✗ ERROR: Build directory not found in .flatpak-builder/build/"
            ls -la .flatpak-builder/build/ 2>/dev/null || echo "No build directory found"
            exit 1
          fi
          echo "Found build directory: $BUILD_ROOT"
          
          # Search for .ui files in any subdirectory of the build
          UI_FILES=$(find "$BUILD_ROOT" -name "*.ui" -type f 2>/dev/null)
          UI_COUNT=$(echo "$UI_FILES" | grep -c . || echo 0)
          
          if [ "$UI_COUNT" -eq 0 ]; then
            echo "✗ ERROR: No .ui files found in build directory"
            echo "Searched in: $BUILD_ROOT"
            echo "Directory structure:"
            find "$BUILD_ROOT" -type d | head -20
            exit 1
          fi
          echo "✓ Found $UI_COUNT .ui file(s)"
          
          # List found UI files
          echo "Generated UI files:"
          echo "$UI_FILES" | head -20
          
          # Verify gresource.xml references match generated files
          echo ""
          echo "=== Checking gresource.xml paths ==="
          MISSING=0
          for file in $(grep -oP '(?<=<file[^>]*>)[^<]+\.ui' "$GRESOURCE_XML" | sed 's|ui/||'); do
            if ! echo "$UI_FILES" | grep -q "/$file$"; then
              echo "✗ Missing: $file (referenced in gresource.xml)"
              MISSING=$((MISSING + 1))
            fi
          done
          
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "✗ RESOURCE VERIFICATION FAILED: $MISSING file(s) missing"
            echo "All generated files:"
            find "$BUILD_ROOT" -type f | sort
            exit 1
          fi
          
          echo "✓ All gresource.xml references resolved successfully"

      # 3. HEADLESS RUNTIME SMOKE TEST
      - name: Smoke Test - Headless Runtime
        run: |
          echo "=== Installing bundle for smoke test ==="
          flatpak install --user --noninteractive --bundle io.github.d3msudo.anura.flatpak

          echo "=== Running smoke test with virtual display ==="
          # Test app launch with virtual display
          # --help exits immediately with code 0 if app starts correctly
          # Environment variables to suppress harmless warnings in headless CI:
          # - NO_AT_BRIDGE=1: disables a11y bus warnings
          # - GTK_A11Y=none: disables GTK accessibility entirely for headless mode
          # - AT_SPI_BUS_ADDRESS=disabled: blocks GTK4 a11y bus lookup at runtime
          # - LIBGL_ALWAYS_SOFTWARE=1: forces software rendering, suppresses DRI3 warnings
          if ! xvfb-run -a flatpak run \
              --env=NO_AT_BRIDGE=1 \
              --env=GTK_A11Y=none \
              --env=AT_SPI_BUS_ADDRESS=disabled \
              --env=LIBGL_ALWAYS_SOFTWARE=1 \
              io.github.d3msudo.anura --help; then
            echo "✗ Smoke test failed - app failed to launch"
            exit 1
          fi

          # Verify app is properly installed
          if ! flatpak list --user | grep -q io.github.d3msudo.anura; then
            echo "✗ Smoke test failed - app not found in installation"
            exit 1
          fi
          echo "✓ Smoke test passed - app launches without critical errors"

      # 4. ESPORTAZIONE ARTEFATTI PER DEBUG
      - name: Upload Flatpak Artifact (Debug)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: io.github.d3msudo.anura-flatpak-${{ github.run_id }}
          path: io.github.d3msudo.anura.flatpak
          retention-days: 7

      - name: Upload Flatpak Bundle to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: io.github.d3msudo.anura.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
