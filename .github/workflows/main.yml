name: CI Quality Check & Release

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # JOB 1: Python code analysis and linting
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Ruff Linter
        uses: chartboost/ruff-action@v1
        with:
          # Automatically repair safe issues and show warnings for the rest
          args: check --select E,F,W,I --target-version py312 --fix --unsafe-fixes --exit-zero

  # JOB 2: Flatpak build and optional release
  flatpak-builder:
    needs: python-quality
    runs-on: ubuntu-latest
    # Using the specialized container to handle GNOME runtimes and permissions
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-nightly
      options: --privileged
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Anura Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.github.d3msudo.anura.flatpak
          manifest-path: flatpak/com.github.d3msudo.anura.json
          cache: false
          run-tests: false

      - name: Upload Flatpak Bundle to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: com.github.d3msudo.anura.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
