name: CI Quality Check & Release

on:
  push:
    branches: [ "main", "development" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "development" ]

jobs:
  # JOB 1: Python code analysis and linting
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Ruff Linter
        uses: chartboost/ruff-action@v1
        with:
          # Strict linting with enforcement - no automatic fixes in CI
          args: check --select E,F,W,I --target-version py312

  # JOB 2: Flatpak build and optional release
  flatpak-builder:
    needs: python-quality
    runs-on: ubuntu-latest
    # Using the specialized container to handle GNOME runtimes and permissions
    # NOTE: We intentionally use gnome-nightly to test forward compatibility
    # with the upcoming GNOME 50 runtime. The production manifest targets
    # gnome-49 (current stable, released September 2025).
    # When GNOME 50 lands on Flathub (~September 2026):
    #   1. Bump "runtime-version" in flatpak/com.github.d3msudo.anura.json: "49" → "50"
    #   2. Update this container tag to gnome-50 (or gnome-nightly for the next cycle).
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-nightly
      options: --privileged
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # RIGOR: Force a clean state to bypass broken caches
      - name: Purge build caches and artifacts
        run: |
          rm -rf .flatpak-builder/
          rm -rf _build/
          rm -rf builddir/
          # Ensure the builder starts with a fresh environment
          echo "Caches purged. Proceeding with clean build."

      - name: Build Anura Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.github.d3msudo.anura.flatpak
          manifest-path: flatpak/com.github.d3msudo.anura.json
          # Explicitly disable action-level cache
          cache: false
          run-tests: false

      - name: Upload Flatpak Bundle to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: com.github.d3msudo.anura.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
